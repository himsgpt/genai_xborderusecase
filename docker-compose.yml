version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: xborder_postgres
    environment:
      POSTGRES_DB: xborder
      POSTGRES_USER: xborder
      POSTGRES_PASSWORD: xborder123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xborder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
